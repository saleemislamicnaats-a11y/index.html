<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Patti Pro - Gold Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #2b0303 0%, #000000 100%); color: #ffd700; text-align: center; margin: 0; padding: 10px; min-height: 100vh; }
        .container { max-width: 450px; margin: auto; border: 2px solid #ffcc00; box-shadow: 0 0 25px #ffcc00; border-radius: 20px; background: rgba(0,0,0,0.95); padding: 20px; margin-top: 20px; }
        #auth-box { display: block; }
        #dashboard-box { display: none; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; font-size: 16px; }
        .balance-card { background: linear-gradient(135deg, #b8860b, #ffd700); color: #000; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 26px; margin: 15px 0; }
        .section { background: #1a1a1a; padding: 15px; border-radius: 12px; margin: 12px 0; border: 1px solid #333; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 5px; }
        .btn-gold { background: linear-gradient(180deg, #ffcc00 0%, #b8860b 100%); color: black; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid white; }
    </style>
</head>
<body>

<div id="auth-box" class="container">
    <h1>🎰 3Patti Pro</h1>
    <p>Please Login or Register</p>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-gold" onclick="window.handleAuth('login')">Login</button>
    <button class="btn btn-blue" onclick="window.handleAuth('register')" style="margin-top:10px;">Create Account</button>
</div>

<div id="dashboard-box" class="container">
    <h2>🎰 3Patti Pro</h2>
    <p id="userEmail" style="font-size: 12px; color: #aaa;"></p>
    <div class="balance-card">Rs <span id="balance">0</span></div>
    <div class="section">
        <p id="status">Ready to play?</p>
        <button class="btn btn-gold" onclick="window.playGame()">Play Game (Bet 100)</button>
    </div>
    <div class="section">
        <h4>Refer & Earn 🎁</h4>
        <button class="btn btn-blue" style="padding:10px" onclick="window.copyRefer()">Copy Refer Link</button>
    </div>
    <div class="section">
        <h4>Deposit Info</h4>
        <div style="background:white; color:black; border-radius:8px; padding:10px; font-weight:bold;">
            EasyPaisa: 03287239318<br>Name: Saleem
        </div>
        <button class="btn btn-red" style="margin-top:10px" onclick="window.requestWithdraw()">Withdraw Money</button>
    </div>
    <button onclick="window.logout()" style="background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Logout</button>
</div>

<a href="https://wa.me/923289230760" class="whatsapp-float" target="_blank">💬 Support</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // IMPORTANT: Make sure this API Key matches exactly with your Firebase Console
    const firebaseConfig = {
        apiKey: "AIzaSyDTNneivrTie-a-e0IlKwifU-v_fV_66XvY", 
        authDomain: "pattipro-c1ffe.firebaseapp.com",
        databaseURL: "https://pattipro-c1ffe-default-rtdb.firebaseio.com",
        projectId: "pattipro-c1ffe",
        storageBucket: "pattipro-c1ffe.appspot.com",
        messagingSenderId: "766843054614",
        appId: "1:766843054614:web:781658832c63e41fc2a337"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Attaching functions to 'window' so they work with HTML onclick
    window.handleAuth = (type) => {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;
        if(!email || !pass) return alert("Please fill details");

        if(type === 'register') {
            createUserWithEmailAndPassword(auth, email, pass)
                .then(r => set(ref(db, 'users/'+r.user.uid), {email, balance: 500, hasDeposited: false}))
                .catch(e => alert("Error: " + e.message));
        } else {
            signInWithEmailAndPassword(auth, email, pass)
                .catch(e => alert("Error: " + e.message));
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("auth-box").style.display = "none";
            document.getElementById("dashboard-box").style.display = "block";
            document.getElementById("userEmail").innerText = user.email;
            onValue(ref(db, 'users/' + user.uid), (s) => {
                if(s.exists()) document.getElementById("balance").innerText = s.val().balance;
            });
        } else {
            document.getElementById("auth-box").style.display = "block";
            document.getElementById("dashboard-box").style.display = "none";
        }
    });

    window.playGame = () => {
        const u = auth.currentUser;
        if(!u) return;
        get(ref(db, 'users/'+u.uid)).then(s => {
            let bal = s.val().balance;
            if(bal < 100) return alert("Low Balance! Minimum 100 required.");
            
            document.getElementById("status").innerText = "Playing...";
            setTimeout(() => {
                let win = Math.random() > 0.6; // 40% win chance
                let newBal = win ? bal + 100 : bal - 100;
                update(ref(db, 'users/'+u.uid), {balance: newBal});
                document.getElementById("status").innerText = win ? "You Won! 🎉" : "You Lost! 💔";
            }, 1000);
        });
    };

    window.logout = () => signOut(auth);

    window.copyRefer = () => {
        const link = window.location.href + "?ref=" + auth.currentUser.uid;
        navigator.clipboard.writeText(link);
        alert("Refer link copied!");
    };

    window.requestWithdraw = () => {
        alert("Withdrawal request sent to Support. Please contact WhatsApp.");
    };
</script>
</body>
</html>
